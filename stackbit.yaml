stackbitVersion: ~0.6.0
nodeVersion: "18"
ssgName: nextjs
cmsName: git

publishDir: public
dataDir: content/data
pagesDir: null # We map pages manually via models or Next.js app router handles it

models:
  home:
    type: page
    singleInstance: true
    file: content/pages/home.json
    label: Home Page
    fields:
      - type: string
        name: title
        label: Title
      - type: string
        name: hero_title
        label: Hero Title
      - type: markdown
        name: hero_description
        label: Hero Description
      - type: list
        name: sections
        label: Sections
        items:
          type: model
          models: [features_grid]
  
  about:
    type: page
    singleInstance: true
    file: content/pages/about.json
    label: About Page
    fields:
      - type: string
        name: title
      - type: markdown
        name: body

  post:
    type: page
    match: content/posts/*.md
    label: Blog Post
    fields:
      - type: string
        name: title
      - type: date
        name: date
      - type: markdown
        name: body
      - type: image
        name: thumbnail

  settings:
    type: data
    singleInstance: true
    file: content/settings/global.json
    label: Global Settings
    fields:
      - type: string
        name: site_title
      - type: string
        name: footer_text
      - type: list
        name: nav_items
        items:
          type: object
          fields:
            - type: string
              name: label
            - type: string
              name: path

  features_grid:
    type: object
    label: Features Grid
    fields:
      - type: string
        name: title
      - type: list
        name: features
        items:
          type: object
          fields:
            - type: string
              name: title
            - type: string
              name: description
            - type: image
              name: icon
